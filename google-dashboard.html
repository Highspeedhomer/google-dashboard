  /* ── Gradient overlay: darker at top/bottom, slightly open in the middle ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(4, 8, 18, 0.55) 0%,
      rgba(4, 8, 18, 0.15) 40%,
      rgba(4, 8, 18, 0.15) 60%,
      rgba(4, 8, 18, 0.65) 100%
    );
    pointer-events: none;
    z-index: 1;
  }

  .wrapper {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 680px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
  }

  /* ── Clock ── */
  .clock-block {
    text-align: center;
    animation: fadeUp 0.6s ease both;
  }

  .clock {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(4rem, 12vw, 7rem);
    letter-spacing: -2px;
    line-height: 1;
    color: #eef2ff;
    text-shadow: 0 2px 24px rgba(80,160,255,0.18);
  }

  .date {
    font-size: 0.88rem;
    color: var(--muted);
    margin-top: 0.4rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── Search ── */
  .search-wrap {
    width: 100%;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .search-form {
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0 1.2rem;
    gap: 0.75rem;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    transition: border-color 0.2s;
  }

  .search-form:focus-within { border-color: var(--accent); }
  .search-icon { color: var(--muted); flex-shrink: 0; }

  .search-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    padding: 0.9rem 0;
  }

  .search-input::placeholder { color: var(--muted); }

  /* ── App sections ── */
  .app-section {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 0.65rem;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .app-section + .app-section { animation-delay: 0.3s; }

  .section-label {
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--border);
  }

  .apps {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.75rem;
  }

  .app-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.55rem;
    padding: 1.2rem 0.75rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    text-decoration: none;
    color: var(--text);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    transition: background 0.2s, border-color 0.2s, transform 0.18s;
    cursor: pointer;
  }

  .app-card:hover {
    background: rgba(20, 30, 55, 0.82);
    border-color: rgba(80, 160, 255, 0.25);
    transform: translateY(-2px);
  }

  .app-card:active { transform: translateY(0); }

  .app-icon {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .app-icon svg { width: 30px; height: 30px; }

  .app-name {
    font-size: 0.875rem;
    font-weight: 500;
    color: #b8bcd0;
    letter-spacing: 0.02em;
  }

  .bottom {
    font-size: 0.75rem;
    color: var(--muted);
    animation: fadeUp 0.6s 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .apps { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>

<script>
  // ── Clock ──
  function pad(n) { return String(n).padStart(2, '0'); }
  function tick() {
    const now = new Date();
    let h = now.getHours(), m = now.getMinutes();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    document.getElementById('clock').textContent = `${h}:${pad(m)} ${ampm}`;
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const day = now.getDate();
    document.getElementById('date').textContent = `${days[now.getDay()]}, ${months[now.getMonth()]} ${day}`;
    document.getElementById('cal-day').textContent = day;
    const hr = now.getHours();
    document.getElementById('greeting').textContent = hr < 12 ? 'Good morning' : hr < 17 ? 'Good afternoon' : 'Good evening';
  }
  tick();
  setInterval(tick, 1000);

  // ── Search ──
  document.querySelector('.search-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const q = this.querySelector('input').value.trim();
    if (q) window.open(`https://www.google.com/search?q=${encodeURIComponent(q)}`, '_blank');
  });
</script>
